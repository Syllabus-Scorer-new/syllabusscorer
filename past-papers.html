<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Past Papers | SyllabusScorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-offwhite">
    <nav>
        <a href="dashboard.html" class="logo">
            <span class="green-s">S</span>yllabusScorer
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">← Back to Dashboard</a></li>
        </ul>
    </nav>

    <main class="dashboard-page">
        <h1 class="welcome-title roll-item">Official SEC Past Papers</h1>
        <div class="study-intro roll-item">
            Select your subject to access official examination papers and marking schemes from the State Examinations Commission.
        </div>
        
        <div class="tabs roll-item" style="margin-top: 2rem;">
            <button class="tab-btn active" id="lc-btn" onclick="setLevel('lc')">Leaving Cert</button>
            <button class="tab-btn" id="jc-btn" onclick="setLevel('jc')">Junior Cycle</button>
        </div>
        
        <div id="subjects-container" class="choices-grid" style="margin-top: 2rem;">
            <!-- Dynamic Subjects -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        let currentLevel = localStorage.getItem('ss_level') || 'lc';

        function setLevel(lvl) {
            currentLevel = lvl;
            localStorage.setItem('ss_level', lvl);
            
            // Update tabs
            document.getElementById('lc-btn').classList.toggle('active', lvl === 'lc');
            document.getElementById('jc-btn').classList.toggle('active', lvl === 'jc');
            
            renderSubjects();
        }

        function renderSubjects() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';
            
            const subjects = currentLevel === 'lc' ? window.LC_SUBJECTS : window.JC_SUBJECTS;
            
            subjects.forEach(subj => {
                const colorVar = window.getSubjectColor(subj);
                const isIrish = subj.toLowerCase().includes('irish');
                const subjectKey = window.toSubjectKey(subj);
                const link = isIrish ? 'irish-past-papers.html' : `past-papers-subject.html?subject=${encodeURIComponent(subjectKey)}`;
                
                const div = document.createElement('div');
                div.className = 'subject-example roll-item visible';
                div.style.setProperty('--subj-color', `var(${colorVar})`);
                div.innerHTML = `
                    <div>
                        <h3 style="color: var(--subj-color); margin-bottom: 0.5rem;">${subj}</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">State Examinations Commission papers</p>
                    </div>
                    <div style="margin-top: 1.5rem; text-align: right;">
                        <a href="${link}" class="btn btn-primary" style="background: var(--subj-color); border: none; font-size: 0.85rem; padding: 0.6rem 1.5rem;">View Papers</a>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setLevel(currentLevel);
        });
    </script>
</body>
</html>
