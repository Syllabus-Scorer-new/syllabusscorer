<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | SyllabusScorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; display: inline-block;">← Back to Home</a>
        <h2 style="margin-bottom: 2rem;">Welcome Back</h2>
        <form class="auth-form" id="loginForm">
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border: none; font-size: 1.1rem; cursor: pointer;">Sign In</button>
        </form>
        <p id="loginError" style="display:none; margin-top: 1rem; color: #b91c1c; font-weight: 600;"></p>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="signup.html" style="color: var(--accent-green); text-decoration: none; font-weight: 600;">Sign Up</a>
        </p>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');

        function showError(message) {
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const email = document.querySelector('input[type="email"]').value.trim();
            const password = document.querySelector('input[type="password"]').value;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                showError(error.message);
                return;
            }

            const fullName =
                data?.user?.user_metadata?.full_name ||
                data?.user?.user_metadata?.name ||
                '';

            if (fullName) {
                localStorage.setItem('ss_username', fullName);
                await supabase.from('profiles').upsert({ id: data.user.id, full_name: fullName });
            }

            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
