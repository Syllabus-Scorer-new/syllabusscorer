<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SyllabusScorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; display: inline-block;">← Back to Home</a>
        <h2 style="margin-bottom: 2rem;">Create Your Account</h2>
        <form class="auth-form" id="signupForm">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border: none; font-size: 1.1rem; cursor: pointer;">Join SyllabusScorer</button>
        </form>
        <p id="signupError" style="display:none; margin-top: 1rem; color: #b91c1c; font-weight: 600;"></p>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="login.html" style="color: var(--accent-green); text-decoration: none; font-weight: 600;">Log In</a>
        </p>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        const form = document.getElementById('signupForm');
        const errorEl = document.getElementById('signupError');

        function showError(message) {
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const fullName = document.querySelector('input[type="text"]').value.trim();
            const email = document.querySelector('input[type="email"]').value.trim();
            const password = document.querySelector('input[type="password"]').value;

            const { data, error } = await supabase.auth.signUp({
                email,
                password,
                options: {
                    data: { full_name: fullName }
                }
            });

            if (error) {
                showError(error.message);
                return;
            }

            // If email confirmation is ON, data.user exists but session may be null.
            // We still store the name locally for immediate UI usage.
            localStorage.setItem('ss_username', fullName);

            // Try to create/update profile row when we have a user id.
            const userId = data?.user?.id;
            if (userId) {
                await supabase.from('profiles').upsert({ id: userId, full_name: fullName });
            }

            window.location.href = 'subject-selection.html';
        });
    </script>
</body>
</html>
