<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Style Questions | SyllabusScorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-offwhite">
    <nav>
        <a href="dashboard.html" class="logo">
            <span class="green-s">S</span>yllabusScorer
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">← Back to Dashboard</a></li>
        </ul>
    </nav>

    <main class="dashboard-page">
        <h1 class="welcome-title roll-item">Exam Style Questions</h1>
        <div class="study-intro roll-item">
            Challenge yourself with customized questions designed to mimic real SEC exam conditions for your chosen subjects.
        </div>
        
        <div class="tabs roll-item" style="margin-top: 2rem;">
            <button class="tab-btn active" id="lc-btn" onclick="setLevel('lc')">Leaving Cert</button>
            <button class="tab-btn" id="jc-btn" onclick="setLevel('jc')">Junior Cycle</button>
        </div>
        
        <div id="subjects-container" class="choices-grid" style="margin-top: 2rem;">
            <!-- Dynamic Questions -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        let currentLevel = localStorage.getItem('ss_level') || 'lc';

        function setLevel(lvl) {
            currentLevel = lvl;
            localStorage.setItem('ss_level', lvl);
            document.getElementById('lc-btn').classList.toggle('active', lvl === 'lc');
            document.getElementById('jc-btn').classList.toggle('active', lvl === 'jc');
            renderSubjects();
        }

        function renderSubjects() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';
            const subjects = currentLevel === 'lc' ? window.LC_SUBJECTS : window.JC_SUBJECTS;
            
            subjects.forEach(subj => {
                const colorVar = window.getSubjectColor(subj);
                const div = document.createElement('div');
                div.className = 'choice-box roll-item visible';
                div.style.setProperty('--subj-color', `var(${colorVar})`);
                div.innerHTML = `
                    <div class="choice-icon" style="color: var(--subj-color);">❓</div>
                    <div class="choice-content">
                        <h3>${subj}</h3>
                        <p>Exam-style questions for targeted practice and assessment.</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setLevel(currentLevel);
        });
    </script>
</body>
</html>
