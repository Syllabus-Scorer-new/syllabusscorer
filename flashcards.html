<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards | SyllabusScorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-offwhite">
    <nav>
        <a href="dashboard.html" class="logo">
            <span class="green-s">S</span>yllabusScorer
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">← Back to Dashboard</a></li>
        </ul>
    </nav>

    <main class="dashboard-page">
        <h1 class="welcome-title roll-item">Active Recall Flashcards</h1>
        <div class="study-intro roll-item">
            Harness the power of active recall with personalized flashcard decks for each of your selected subjects.
        </div>
        
        <div class="tabs roll-item" style="margin-top: 2rem;">
            <button class="tab-btn active" id="lc-btn" onclick="setLevel('lc')">Leaving Cert</button>
            <button class="tab-btn" id="jc-btn" onclick="setLevel('jc')">Junior Cycle</button>
        </div>
        
        <div id="subjects-container" class="choices-grid" style="margin-top: 2rem;">
            <!-- Dynamic Decks -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        let currentLevel = localStorage.getItem('ss_level') || 'lc';

        function setLevel(lvl) {
            currentLevel = lvl;
            localStorage.setItem('ss_level', lvl);
            document.getElementById('lc-btn').classList.toggle('active', lvl === 'lc');
            document.getElementById('jc-btn').classList.toggle('active', lvl === 'jc');
            renderSubjects();
        }

        function renderSubjects() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';
            const subjects = currentLevel === 'lc' ? window.LC_SUBJECTS : window.JC_SUBJECTS;
            
            subjects.forEach(subj => {
                const colorVar = window.getSubjectColor(subj);
                const div = document.createElement('div');
                div.className = 'flashcard roll-item visible';
                div.style.setProperty('--subj-color', `var(${colorVar})`);
                div.innerHTML = `
                    <span style="font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--subj-color); letter-spacing: 0.05em;">${subj}</span>
                    <h3 style="margin: 1.2rem 0; font-size: 1.4rem;">Memory Deck</h3>
                    <p style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.4;">Active recall cards focused on core definitions and concepts.</p>
                    <div style="margin-top: auto; padding-top: 2rem;">
                        <a href="#" class="btn btn-primary" style="background: var(--subj-color); border: none; display: block; text-align: center; font-size: 0.9rem;">Start Quiz</a>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setLevel(currentLevel);
        });
    </script>
</body>
</html>
