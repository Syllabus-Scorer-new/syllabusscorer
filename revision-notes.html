<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Notes | SyllabusScorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-offwhite">
    <nav>
        <a href="dashboard.html" class="logo">
            <span class="green-s">S</span>yllabusScorer
        </a>
        <ul class="nav-links">
            <li><a href="dashboard.html">← Back to Dashboard</a></li>
        </ul>
    </nav>

    <main class="dashboard-page">
        <h1 class="welcome-title roll-item">Revision Notes</h1>
        <div class="study-intro roll-item">
            Access our library of condensed, high-yield notes designed to help you tackle the most challenging parts of the curriculum.
        </div>
        
        <div class="tabs roll-item" style="margin-top: 2rem;">
            <button class="tab-btn active" id="lc-btn" onclick="setLevel('lc')">Leaving Cert</button>
            <button class="tab-btn" id="jc-btn" onclick="setLevel('jc')">Junior Cycle</button>
        </div>
        
        <div id="subjects-container" class="choices-grid" style="margin-top: 2rem;">
            <!-- Dynamic Notes -->
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        let currentLevel = localStorage.getItem('ss_level') || 'lc';

        function setLevel(lvl) {
            currentLevel = lvl;
            localStorage.setItem('ss_level', lvl);
            document.getElementById('lc-btn').classList.toggle('active', lvl === 'lc');
            document.getElementById('jc-btn').classList.toggle('active', lvl === 'jc');
            renderSubjects();
        }

        function renderSubjects() {
            const container = document.getElementById('subjects-container');
            container.innerHTML = '';
            const subjects = currentLevel === 'lc' ? window.LC_SUBJECTS : window.JC_SUBJECTS;
            
            subjects.forEach(subj => {
                const colorVar = getSubjectColor(subj);
                const div = document.createElement('div');
                div.className = 'choice-box roll-item visible';
                div.style.setProperty('--subj-color', `var(${colorVar})`);
                div.innerHTML = `
                    <div class="choice-icon" style="color: var(--subj-color);">📝</div>
                    <div class="choice-content">
                        <h3>${subj}</h3>
                        <p>Comprehensive revision notes covering the entire syllabus.</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setLevel(currentLevel);
        });

        function getSubjectColor(subject) {
            const s = subject.toLowerCase();
            if (s.includes('maths')) return '--subj-maths';
            if (s.includes('english')) return '--subj-english';
            if (s.includes('irish')) return '--subj-irish';
            if (s.includes('biology')) return '--subj-biology';
            if (s.includes('chemistry')) return '--subj-chemistry';
            if (s.includes('physics')) return '--subj-physics';
            if (s.includes('science')) return '--subj-science';
            if (s.includes('history')) return '--subj-history';
            if (s.includes('geography')) return '--subj-geography';
            if (s.includes('business')) return '--subj-business';
            if (s.includes('french')) return '--subj-french';
            if (s.includes('german')) return '--subj-german';
            if (s.includes('religion')) return '--subj-religion';
            if (s.includes('spanish')) return '--subj-spanish';
            if (s.includes('home ec')) return '--subj-homeec';
            if (s.includes('art')) return '--subj-art';
            if (s.includes('music')) return '--subj-music';
            return '--subj-default';
        }
    </script>
</body>
</html>
